version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adamae-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adamae}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adamae_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-adamae}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adamae} -d ${POSTGRES_DB:-adamae}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adamae-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: adamae-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: adamae-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-adamae}:${POSTGRES_PASSWORD:-adamae_dev_password}@postgres:5432/${POSTGRES_DB:-adamae}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-adamae}
      MINIO_PUBLIC_URL: http://localhost:9000/adamae
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production-min-32-chars}
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "7d"
      NODE_ENV: development
      PORT: 3001
      API_URL: http://localhost:3001
      CLIENT_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai:8000
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-ai-service-secret-token}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-AfroToon AI <noreply@adamae.com>}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./uploads:/app/uploads

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile.dev
    container_name: adamae-ai
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-adamae}
      DEVICE: cpu
      PYTHONUNBUFFERED: 1
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-ai-service-secret-token}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./ai:/app
      - ./uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 8G

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: adamae-client
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_AI_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: adamae-network