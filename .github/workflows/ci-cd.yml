name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # LINT & TYPE CHECK (All services)
  # ============================================
  lint-server:
    name: Lint Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint

  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint

  lint-ai:
    name: Lint AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .

  # ============================================
  # TESTS
  # ============================================
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: adamae_test
        ports: 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d adamae_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/adamae_test?schema=public
      - run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/adamae_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-testing-only-32chars
          NODE_ENV: test

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run test --if-present

  test-ai:
    name: Test AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: python -m pytest tests/ -v --tb=short || echo "No tests directory, skipping"

  # ============================================
  # BUILD
  # ============================================
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [lint-server, test-server]
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: [lint-client, test-client]
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build

  build-ai:
    name: Build AI Service
    runs-on: ubuntu-latest
    needs: [lint-ai, test-ai]
    defaults:
      run:
        working-directory: ./ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py

  # ============================================
  # DOCKER BUILD & PUSH
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-server, build-client, build-ai]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-client
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for AI
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push AI
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          file: ./ai/Dockerfile
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # INTEGRATION TEST WITH DOCKER COMPOSE
  # ============================================
  integration-test:
    name: Integration Test (Docker Compose)
    runs-on: ubuntu-latest
    needs: [build-server, build-client, build-ai]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cd docker
          docker-compose -f docker-compose.yml up -d --build

      - name: Wait for services
        run: |
          sleep 30
          curl -f http://localhost:3001/api/health/live || exit 1
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3000 || exit 1

      - name: Run integration tests
        run: |
          # Test API endpoints
          curl -s http://localhost:3001/api/health | grep -q '"server":"ok"'
          curl -s http://localhost:8000/health | grep -q '"status":"healthy"'
          echo "Integration tests passed"

      - name: Cleanup
        if: always()
        run: |
          cd docker
          docker-compose -f docker-compose.yml down -v

  # ============================================
  # DEPLOY (Manual approval for production)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploy to staging server..."
          # Add your staging deployment commands here
          # Example: ssh to server, pull images, restart compose

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to production
        run: |
          echo "Deploy to production server..."
          # Add your production deployment commands here
          # Example: ssh to server, pull images, restart compose with zero-downtime

  # ============================================
  # NOTIFICATIONS
  # ============================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint-server, lint-client, lint-ai, test-server, test-client, test-ai, build-server, build-client, build-ai, docker]
    if: always()
    steps:
      - name: Send notification
        if: failure()
        run: |
          echo "❌ Pipeline failed"
          # Add Slack/Discord/Email notification here
          # Example: curl -X POST -H 'Content-type: application/json' --data '{"text":"Build failed"}' $SLACK_WEBHOOK

      - name: Success notification
        if: success()
        run: |
          echo "✅ Pipeline succeeded"
          # Add success notification here